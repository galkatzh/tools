<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <!-- Intentionally omitting apple-mobile-web-app-capable: standalone PWA mode
       on iOS silently denies geolocation without ever prompting the user. -->
  <meta name="theme-color" content="#ffffff">
  <title>מקלט קרוב</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div id="panel" class="panel collapsed">
    <div class="panel-handle" id="panel-handle"></div>
    <div id="shelter-list" class="shelter-list"></div>
  </div>

  <button id="locate-btn" class="locate-btn" aria-label="מצא מיקום">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
    </svg>
  </button>

  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <span>מחפש מקלטים...</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
