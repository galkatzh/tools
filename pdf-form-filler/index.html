<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Form Filler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #16161e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ──────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #1e1e2e;
      border-bottom: 1px solid #313244;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .toolbar h1 { font-size: 1.1rem; font-weight: 600; color: #cba6f7; flex: 1; }
    .toolbar button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: opacity .15s;
    }
    .toolbar button:hover { opacity: 0.85; }
    #btn-load-new { background: #313244; color: #cdd6f4; }
    #btn-download { background: #cba6f7; color: #1e1e2e; display: none; }
    #btn-flatten  { background: #a6e3a1; color: #1e1e2e; display: none; }

    /* ── Drop zone ───────────────────────────── */
    #drop-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 40px auto;
      width: min(500px, 90vw);
      border: 2px dashed #45475a;
      border-radius: 16px;
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    #drop-zone.drag-over { border-color: #cba6f7; background: #1e1e2e; }
    #drop-zone svg { opacity: .5; }
    #drop-zone p { color: #a6adc8; font-size: 0.95rem; }
    #drop-zone strong { color: #cdd6f4; }
    #file-input { display: none; }

    /* ── App layout ──────────────────────────── */
    #app {
      flex: 1;
      display: none;
      overflow: hidden;
      height: calc(100vh - 49px);
    }
    #app.visible { display: flex; }

    /* ── Fields panel ────────────────────────── */
    #fields-panel {
      width: 340px;
      min-width: 260px;
      background: #1e1e2e;
      border-right: 1px solid #313244;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #fields-header {
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: #6c7086;
      border-bottom: 1px solid #313244;
    }
    #fields-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #fields-list::-webkit-scrollbar { width: 6px; }
    #fields-list::-webkit-scrollbar-track { background: transparent; }
    #fields-list::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .field-group label {
      font-size: 0.78rem;
      color: #a6adc8;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .field-group input[type="text"],
    .field-group input[type="number"],
    .field-group select,
    .field-group textarea {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      padding: 6px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      width: 100%;
      transition: border-color .15s;
    }
    .field-group input:focus,
    .field-group select:focus,
    .field-group textarea:focus { outline: none; border-color: #cba6f7; }
    .field-group textarea { min-height: 72px; resize: vertical; }
    .field-group select option { background: #313244; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-row input[type="checkbox"] { accent-color: #cba6f7; width: 16px; height: 16px; cursor: pointer; }

    .radio-group { display: flex; flex-direction: column; gap: 4px; }
    .radio-option { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; cursor: pointer; }
    .radio-option input[type="radio"] { accent-color: #cba6f7; width: 14px; height: 14px; cursor: pointer; }

    .field-type-badge {
      font-size: 0.68rem;
      padding: 1px 5px;
      border-radius: 4px;
      background: #313244;
      color: #6c7086;
      float: right;
    }

    .no-fields {
      color: #6c7086;
      font-size: 0.9rem;
      text-align: center;
      padding: 20px;
    }

    /* ── Preview panel ───────────────────────── */
    #preview-panel {
      flex: 1;
      overflow-y: auto;
      background: #181825;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 16px;
    }
    #preview-panel::-webkit-scrollbar { width: 8px; }
    #preview-panel::-webkit-scrollbar-track { background: transparent; }
    #preview-panel::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }

    #preview-panel canvas {
      max-width: 100%;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }

    #preview-loading {
      color: #6c7086;
      font-size: 0.9rem;
      margin-top: 40px;
    }

    /* ── Error toast ─────────────────────────── */
    #error-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #f38ba8;
      color: #1e1e2e;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      transition: transform .3s;
      z-index: 999;
      max-width: 400px;
      text-align: center;
    }
    #error-toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>PDF Form Filler</h1>
    <button id="btn-load-new">Open PDF</button>
    <button id="btn-flatten">Flatten &amp; Download</button>
    <button id="btn-download">Download Filled PDF</button>
  </div>

  <div id="drop-zone">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#cba6f7" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <line x1="9" y1="15" x2="15" y2="15"/>
    </svg>
    <p><strong>Drop a PDF here</strong><br>or click to browse</p>
    <input type="file" id="file-input" accept=".pdf">
  </div>

  <div id="app">
    <div id="fields-panel">
      <div id="fields-header">Form Fields</div>
      <div id="fields-list"></div>
    </div>
    <div id="preview-panel">
      <div id="preview-loading">Rendering preview…</div>
    </div>
  </div>

  <div id="error-toast"></div>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
