<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hebrew Word Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <main id="app">
    <header>
      <h1>מחולל מילים</h1>
    </header>

    <div id="card" class="card" role="button" tabindex="0" aria-label="לחץ למילה חדשה">
      <div class="hebrew" id="word-hebrew" lang="he" dir="rtl"></div>
    </div>

    <div id="history" class="history" aria-label="מילים אחרונות"></div>
  </main>
</body>
</html>
