<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jerusalem Shadow Viewer</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #cesiumContainer {
      width: 100%;
      height: 100vh;
    }

    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(38, 38, 38, 0.95);
      padding: 15px;
      border-radius: 8px;
      color: white;
      z-index: 1000;
      min-width: 300px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }

    #controls h3 {
      margin-bottom: 12px;
      font-size: 16px;
      border-bottom: 1px solid #555;
      padding-bottom: 8px;
    }

    #panelToggle {
      display: none;
    }

    /* Collapsible sections for mobile */
    .collapsible-section {
      display: block;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      color: #ccc;
    }

    .control-group input[type="date"],
    .control-group input[type="number"],
    .control-group input[type="range"],
    .control-group select {
      width: 100%;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #333;
      color: white;
    }

    .control-group input[type="range"] {
      padding: 0;
      cursor: pointer;
    }

    #timeDisplay {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin: 10px 0;
      font-family: monospace;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 20px 40px;
      border-radius: 8px;
      z-index: 2000;
      font-size: 16px;
    }

    #loading.hidden {
      display: none;
    }

    .quick-times {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .quick-times button {
      flex: 1;
      min-width: 45px;
      padding: 6px 8px;
      border: 1px solid #555;
      background: #444;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .quick-times button:hover {
      background: #666;
    }

    .quick-times button.active {
      background: #0078d4;
      border-color: #0078d4;
    }

    #shadowToggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #555;
    }

    #shadowToggle input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    #shadowToggle label {
      cursor: pointer;
      font-size: 14px;
    }

    #status {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #555;
      font-size: 12px;
      color: #aaa;
    }

    .cesium-credit-logoContainer,
    .cesium-credit-expand-link {
      display: none !important;
    }

    /* Sunlight Analysis Section */
    .section-header {
      margin-top: 15px;
      padding-top: 12px;
      border-top: 1px solid #555;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .inline-inputs {
      display: flex;
      gap: 10px;
    }

    .inline-inputs .control-group {
      flex: 1;
      margin-bottom: 8px;
    }

    .inline-inputs input[type="number"] {
      width: 100%;
    }

    #analyzeBtn {
      width: 100%;
      padding: 10px;
      background: #0078d4;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
    }

    #analyzeBtn:hover {
      background: #1084d8;
    }

    #analyzeBtn:disabled {
      background: #555;
      cursor: not-allowed;
    }

    #clearAnalysisBtn {
      width: 100%;
      padding: 8px;
      background: #444;
      border: 1px solid #666;
      border-radius: 4px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
    }

    #clearAnalysisBtn:hover {
      background: #555;
    }

    #analysisProgress {
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
    }

    #analysisProgress .progress-bar {
      height: 6px;
      background: #333;
      border-radius: 3px;
      margin-top: 5px;
      overflow: hidden;
    }

    #analysisProgress .progress-fill {
      height: 100%;
      background: #0078d4;
      width: 0%;
      transition: width 0.2s;
    }

    #analysisResult {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #555;
    }

    #sunBar {
      height: 18px;
      background: #5c4033;
      border-radius: 4px;
      overflow: hidden;
    }

    #sunFill {
      height: 100%;
      background: linear-gradient(to right, #ff9800, #ffeb3b);
      width: 0%;
      transition: width 0.5s ease;
      border-radius: 4px;
    }

    #sunLabel {
      margin-top: 4px;
      font-size: 12px;
      color: #ccc;
      text-align: center;
    }

    #locationBtn {
      width: 100%;
      padding: 8px;
      background: #444;
      border: 1px solid #666;
      border-radius: 4px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    #locationBtn:hover {
      background: #555;
    }

    /* Weather info panel */
    #weatherPanel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #555;
    }

    #weatherPanel .section-header {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      font-size: 12px;
    }

    .weather-grid .weather-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .weather-grid .weather-label {
      color: #999;
    }

    .weather-grid .weather-value {
      color: #fff;
      font-weight: 500;
    }

    .uv-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 11px;
    }

    .uv-low { background: #4caf50; color: #fff; }
    .uv-moderate { background: #ffeb3b; color: #333; }
    .uv-high { background: #ff9800; color: #fff; }
    .uv-very-high { background: #f44336; color: #fff; }
    .uv-extreme { background: #9c27b0; color: #fff; }

    .weather-desc {
      margin-top: 6px;
      font-size: 11px;
      color: #bbb;
      font-style: italic;
    }

    .weather-source {
      margin-top: 6px;
      font-size: 10px;
      color: #666;
    }

    .weather-source a {
      color: #888;
      text-decoration: none;
    }

    .weather-source a:hover {
      color: #aaa;
    }

    #weatherLoading {
      font-size: 12px;
      color: #888;
    }

    /* ==================== MOBILE LAYOUT ==================== */
    @media (max-width: 600px) {
      #controls {
        position: fixed;
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        min-width: unset;
        border-radius: 16px 16px 0 0;
        padding: 10px 15px 15px;
        max-height: 70vh;
        transition: max-height 0.3s ease;
      }

      #controls.collapsed {
        max-height: none;
        overflow: hidden;
      }

      /* Drag handle / toggle button at top of panel */
      #panelToggle {
        display: block;
        width: 40px;
        height: 5px;
        background: #666;
        border-radius: 3px;
        margin: 0 auto 8px;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      #controls h3 {
        font-size: 14px;
        margin-bottom: 8px;
        padding-bottom: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* Always-visible core controls on mobile */
      #controls.collapsed .collapsible-section {
        display: none;
      }

      /* Larger touch targets */
      .quick-times button {
        padding: 10px 8px;
        font-size: 13px;
        min-width: 40px;
      }

      #locationBtn,
      #analyzeBtn,
      #clearAnalysisBtn {
        padding: 12px;
        font-size: 14px;
      }

      .control-group input[type="date"],
      .control-group input[type="number"],
      .control-group select {
        padding: 10px 8px;
        font-size: 14px;
      }

      /* Taller range slider for easier touch */
      .control-group input[type="range"] {
        height: 36px;
      }

      #shadowToggle input {
        width: 22px;
        height: 22px;
      }

      #timeDisplay {
        font-size: 28px;
      }

      /* Cesium container should not be hidden behind the panel */
      #cesiumContainer {
        height: 100vh;
        height: 100dvh;
      }
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <div id="controls" class="collapsed">
    <button id="panelToggle" aria-label="Toggle panel"></button>
    <h3>Jerusalem Shadow Viewer</h3>

    <div class="control-group">
      <label for="dateInput">Date</label>
      <input type="date" id="dateInput">
    </div>

    <div class="control-group">
      <label>Time</label>
      <div id="timeDisplay">12:00</div>
      <input type="range" id="timeSlider" min="0" max="1440" value="720" step="15">
    </div>

    <div class="control-group">
      <label>Quick Times</label>
      <div class="quick-times">
        <button data-hour="6">6:00</button>
        <button data-hour="8">8:00</button>
        <button data-hour="10">10:00</button>
        <button data-hour="12">12:00</button>
        <button data-hour="14">14:00</button>
        <button data-hour="16">16:00</button>
        <button data-hour="18">18:00</button>
        <button data-hour="20">20:00</button>
      </div>
    </div>

    <div class="collapsible-section">

    <button id="locationBtn">Go to My Location</button>

    <div id="shadowToggle">
      <input type="checkbox" id="shadowsEnabled" checked>
      <label for="shadowsEnabled">Show Shadows</label>
    </div>

    <!-- Sunlight Analysis Section -->
    <div class="section-header">Sunlight Analysis</div>

    <div class="inline-inputs">
      <div class="control-group">
        <label for="analysisStart">From</label>
        <input type="number" id="analysisStart" min="0" max="23" value="8">
      </div>
      <div class="control-group">
        <label for="analysisEnd">To</label>
        <input type="number" id="analysisEnd" min="0" max="23" value="16">
      </div>
      <div class="control-group">
        <label for="analysisInterval">Interval</label>
        <select id="analysisInterval">
          <option value="15">15 min</option>
          <option value="30" selected>30 min</option>
          <option value="60">1 hour</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <label for="gridDensity">Grid Density</label>
      <select id="gridDensity">
        <option value="10">Low (faster)</option>
        <option value="20" selected>Medium</option>
        <option value="35">High (slower)</option>
      </select>
    </div>

    <button id="analyzeBtn">Analyze Sunlight in View</button>
    <button id="clearAnalysisBtn">Clear Analysis</button>

    <div id="analysisProgress" style="display: none;">
      <span id="progressText">Analyzing...</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div id="status">
      Loading tiles: <span id="tilesLoaded">0</span>/7
    </div>

    </div><!-- end .collapsible-section -->

    <div id="analysisResult" style="display: none;">
      <div id="sunBar">
        <div id="sunFill"></div>
      </div>
      <div id="sunLabel"></div>
    </div>

    <!-- Weather Info Panel -->
    <div id="weatherPanel">
      <div class="section-header">Weather Forecast</div>
      <div id="weatherLoading">Loading weather data...</div>
      <div id="weatherContent" style="display: none;">
        <div class="weather-grid">
          <div class="weather-item">
            <span class="weather-label">Sky:</span>
            <span class="weather-value" id="wxSky">—</span>
          </div>
          <div class="weather-item">
            <span class="weather-label">UV:</span>
            <span class="weather-value" id="wxUV">—</span>
          </div>
          <div class="weather-item">
            <span class="weather-label">Temp:</span>
            <span class="weather-value" id="wxTemp">—</span>
          </div>
          <div class="weather-item">
            <span class="weather-label">Rain:</span>
            <span class="weather-value" id="wxRain">—</span>
          </div>
          <div class="weather-item">
            <span class="weather-label">Cloud:</span>
            <span class="weather-value" id="wxCloud">—</span>
          </div>
          <div class="weather-item">
            <span class="weather-label">UV Max:</span>
            <span class="weather-value" id="wxUVMax">—</span>
          </div>
        </div>
        <div class="weather-desc" id="wxDesc"></div>
        <div class="weather-source">
          Data: <a href="https://www.02ws.co.il" target="_blank">02ws</a> · <a href="https://ims.gov.il" target="_blank">IMS</a>
        </div>
      </div>
    </div>
  </div>

  <div id="loading">Loading Jerusalem 3D Model...</div>

  <script>
    // Suppress Ion token warning
    Cesium.Ion.defaultAccessToken = undefined;

    // Jerusalem center coordinates (approximate)
    const JERUSALEM_CENTER = Cesium.Cartesian3.fromDegrees(35.2137, 31.7683, 1500);

    // Tileset URLs for Jerusalem 2022
    const TILESET_URLS = [
      'https://gis.ofek-air.com/DATA/Jerusalem_2022/Area1/Cesium/tileset.json',
      'https://gis.ofek-air.com/DATA/Jerusalem_2022/Area2/Cesium/tileset.json',
      'https://gis.ofek-air.com/DATA/Jerusalem_2022/Area3/Cesium/tileset.json',
      'https://gis.ofek-air.com/DATA/Jerusalem_2022/Area4/Cesium/tileset.json',
      'https://gis.ofek-air.com/DATA/Jerusalem_2022/Area5/Cesium/tileset.json',
      'https://gis.ofek-air.com/DATA/Jerusalem_2022/Area6/tileset.json',
      'https://gis.ofek-air.com/DATA/Jerusalem_2022/Area7/Cesium/tileset.json'
    ];

    // Initialize viewer
    const viewer = new Cesium.Viewer('cesiumContainer', {
      imageryProvider: new Cesium.UrlTemplateImageryProvider({
        url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
        subdomains: ['a', 'b', 'c', 'd'],
        credit: 'Map tiles by Carto, under CC BY 3.0. Data by OpenStreetMap, under ODbL.'
      }),
      terrainProvider: undefined,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      animation: false,
      timeline: false,
      fullscreenButton: false,
      vrButton: false,
      infoBox: false,
      selectionIndicator: false,
      shadows: true,
      shouldAnimate: false
    });

    // Enable shadows
    viewer.shadows = true;
    viewer.scene.globe.enableLighting = true;
    viewer.scene.shadowMap.size = 4096;
    viewer.scene.shadowMap.softShadows = true;
    viewer.scene.shadowMap.darkness = 0.4;

    // Set initial camera position
    viewer.camera.flyTo({
      destination: JERUSALEM_CENTER,
      orientation: {
        heading: Cesium.Math.toRadians(0),
        pitch: Cesium.Math.toRadians(-45),
        roll: 0
      },
      duration: 0
    });

    // Load tilesets
    let loadedCount = 0;
    const tilesets = [];

    async function loadTilesets() {
      for (const url of TILESET_URLS) {
        try {
          const tileset = await Cesium.Cesium3DTileset.fromUrl(url, {
            shadows: Cesium.ShadowMode.ENABLED,
            maximumScreenSpaceError: 16
          });
          viewer.scene.primitives.add(tileset);
          tilesets.push(tileset);
          loadedCount++;
          document.getElementById('tilesLoaded').textContent = loadedCount;
        } catch (error) {
          console.error('Error loading tileset:', url, error);
          loadedCount++;
          document.getElementById('tilesLoaded').textContent = loadedCount;
        }
      }

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('status').innerHTML = 'Tiles loaded. Drag to navigate, scroll to zoom.';
    }

    loadTilesets();

    // Time controls
    const dateInput = document.getElementById('dateInput');
    const timeSlider = document.getElementById('timeSlider');
    const timeDisplay = document.getElementById('timeDisplay');
    const shadowsEnabled = document.getElementById('shadowsEnabled');
    const quickTimeButtons = document.querySelectorAll('.quick-times button');

    // Set default date to today
    const today = new Date();
    dateInput.value = today.toISOString().split('T')[0];

    function updateTime() {
      const date = new Date(dateInput.value + 'T00:00:00');
      const minutes = parseInt(timeSlider.value);
      const hours = Math.floor(minutes / 60);
      const mins = minutes % 60;

      // Set time (Jerusalem is UTC+2 or UTC+3 depending on DST)
      date.setUTCHours(hours - 2, mins, 0, 0);

      // Update display
      timeDisplay.textContent = `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;

      // Update Cesium clock
      viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);

      // Update quick time button states
      quickTimeButtons.forEach(btn => {
        const btnHour = parseInt(btn.dataset.hour);
        btn.classList.toggle('active', btnHour === hours && mins === 0);
      });
    }

    dateInput.addEventListener('change', updateTime);
    timeSlider.addEventListener('input', updateTime);

    quickTimeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const hour = parseInt(btn.dataset.hour);
        timeSlider.value = hour * 60;
        updateTime();
        updateWeatherDisplay();
      });
    });

    shadowsEnabled.addEventListener('change', () => {
      viewer.shadows = shadowsEnabled.checked;
      viewer.scene.globe.enableLighting = shadowsEnabled.checked;
    });

    // Initialize time
    timeSlider.value = 720; // 12:00
    updateTime();

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;

      const step = e.shiftKey ? 60 : 15; // Shift = 1 hour, otherwise 15 min

      if (e.key === 'ArrowLeft') {
        timeSlider.value = Math.max(0, parseInt(timeSlider.value) - step);
        updateTime();
        updateWeatherDisplay();
      } else if (e.key === 'ArrowRight') {
        timeSlider.value = Math.min(1440, parseInt(timeSlider.value) + step);
        updateTime();
        updateWeatherDisplay();
      }
    });

    // ==================== GEOLOCATION ====================
    const locationBtn = document.getElementById('locationBtn');

    // Jerusalem bounds (approximate)
    const JERUSALEM_BOUNDS = {
      minLon: 35.1,
      maxLon: 35.3,
      minLat: 31.7,
      maxLat: 31.85
    };

    function isInJerusalem(lon, lat) {
      return lon >= JERUSALEM_BOUNDS.minLon && lon <= JERUSALEM_BOUNDS.maxLon &&
             lat >= JERUSALEM_BOUNDS.minLat && lat <= JERUSALEM_BOUNDS.maxLat;
    }

    function flyToLocation(lon, lat, height = 500) {
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(lon, lat, height),
        orientation: {
          heading: Cesium.Math.toRadians(0),
          pitch: Cesium.Math.toRadians(-50),
          roll: 0
        },
        duration: 2
      });
    }

    function getUserLocation() {
      if (!navigator.geolocation) {
        alert('Geolocation is not supported by your browser');
        return;
      }

      locationBtn.textContent = 'Getting location...';
      locationBtn.disabled = true;

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lon = position.coords.longitude;
          const lat = position.coords.latitude;

          if (isInJerusalem(lon, lat)) {
            flyToLocation(lon, lat, 400);
            locationBtn.textContent = 'Go to My Location';
          } else {
            alert('You are not in Jerusalem. The 3D model only covers Jerusalem.');
            locationBtn.textContent = 'Go to My Location';
          }
          locationBtn.disabled = false;
        },
        (error) => {
          alert('Unable to get your location: ' + error.message);
          locationBtn.textContent = 'Go to My Location';
          locationBtn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    locationBtn.addEventListener('click', getUserLocation);

    // ==================== SUNLIGHT ANALYSIS ====================
    const analyzeBtn = document.getElementById('analyzeBtn');
    const analysisProgress = document.getElementById('analysisProgress');
    const progressText = document.getElementById('progressText');
    const progressFill = document.getElementById('progressFill');
    const analysisResult = document.getElementById('analysisResult');

    let analysisRunning = false;

    // Get sun direction for a given date/time
    function getSunDirection(date) {
      const julianDate = Cesium.JulianDate.fromDate(date);
      const sunPosition = Cesium.Simon1994PlanetaryPositions.computeSunPositionInEarthInertialFrame(julianDate);
      const transformMatrix = Cesium.Transforms.computeTemeToPseudoFixedMatrix(julianDate);
      const sunPositionFixed = Cesium.Matrix3.multiplyByVector(transformMatrix, sunPosition, new Cesium.Cartesian3());
      return Cesium.Cartesian3.normalize(sunPositionFixed, new Cesium.Cartesian3());
    }

    // Check if a point is in shadow at a given time
    function isPointInShadow(point, sunDirection) {
      const rayDirection = Cesium.Cartesian3.negate(sunDirection, new Cesium.Cartesian3());
      const ray = new Cesium.Ray(point, Cesium.Cartesian3.negate(rayDirection, new Cesium.Cartesian3()));

      // Cast ray toward the sun
      const result = viewer.scene.pickFromRay(ray, []);
      return result !== undefined && result.object !== undefined;
    }

    // Generate grid of sample points in current view
    function generateSamplePoints(gridSize) {
      const points = [];
      const canvas = viewer.canvas;
      const width = canvas.width;
      const height = canvas.height;

      const stepX = width / (gridSize + 1);
      const stepY = height / (gridSize + 1);

      for (let i = 1; i <= gridSize; i++) {
        for (let j = 1; j <= gridSize; j++) {
          const screenPos = new Cesium.Cartesian2(stepX * i, stepY * j);
          const ray = viewer.camera.getPickRay(screenPos);

          if (ray) {
            const position = viewer.scene.globe.pick(ray, viewer.scene);
            if (position) {
              // Lift point slightly above ground to avoid self-intersection
              const cartographic = Cesium.Cartographic.fromCartesian(position);
              const elevatedPosition = Cesium.Cartesian3.fromRadians(
                cartographic.longitude,
                cartographic.latitude,
                cartographic.height + 2 // 2 meters above ground
              );
              points.push({
                position: elevatedPosition,
                screenPos: screenPos,
                sunCount: 0,
                totalSamples: 0
              });
            }
          }
        }
      }
      return points;
    }

    /**
     * Run sunlight analysis: sample a grid of points across the view,
     * test shadow at each time step, render a heatmap overlay on a
     * canvas positioned over the Cesium viewer.
     */
    async function runAnalysis() {
      if (analysisRunning) return;

      const startHour = parseInt(document.getElementById('analysisStart').value);
      const endHour = parseInt(document.getElementById('analysisEnd').value);
      const interval = parseInt(document.getElementById('analysisInterval').value);
      const gridSize = parseInt(document.getElementById('gridDensity').value);

      if (startHour >= endHour) {
        alert('Start time must be before end time');
        return;
      }

      analysisRunning = true;
      analyzeBtn.disabled = true;
      analysisProgress.style.display = 'block';
      analysisResult.style.display = 'none';
      clearAnalysis();

      progressText.textContent = 'Generating sample points...';
      progressFill.style.width = '0%';
      await new Promise(r => setTimeout(r, 100));

      const points = generateSamplePoints(gridSize);
      if (points.length === 0) {
        alert('No valid sample points in view. Try zooming in to an area with 3D tiles.');
        analysisRunning = false;
        analyzeBtn.disabled = false;
        analysisProgress.style.display = 'none';
        return;
      }

      // Generate time samples
      const date = new Date(dateInput.value + 'T00:00:00');
      const timeSamples = [];
      for (let h = startHour; h <= endHour; h++) {
        for (let m = 0; m < 60; m += interval) {
          if (h === endHour && m > 0) break;
          const sampleDate = new Date(date);
          sampleDate.setUTCHours(h - 2, m, 0, 0); // Jerusalem UTC+2
          timeSamples.push(sampleDate);
        }
      }

      const totalWork = points.length * timeSamples.length;
      let completed = 0;

      // Analyze each point at each time
      for (const timePoint of timeSamples) {
        const sunDir = getSunDirection(timePoint);

        const cameraPos = viewer.camera.position;
        const cameraCart = Cesium.Cartographic.fromCartesian(cameraPos);
        const localUp = Cesium.Cartesian3.normalize(
          Cesium.Cartesian3.fromRadians(cameraCart.longitude, cameraCart.latitude, 0),
          new Cesium.Cartesian3()
        );
        const sunElevation = Cesium.Cartesian3.dot(sunDir, localUp);

        if (sunElevation < 0.05) {
          points.forEach(p => p.totalSamples++);
          completed += points.length;
        } else {
          for (const point of points) {
            if (!isPointInShadow(point.position, sunDir)) {
              point.sunCount++;
            }
            point.totalSamples++;
            completed++;
          }
        }

        const progress = (completed / totalWork) * 100;
        progressFill.style.width = progress + '%';
        progressText.textContent = `Analyzing: ${Math.round(progress)}%`;
        await new Promise(r => setTimeout(r, 0));
      }

      // Render heatmap on an overlay canvas
      progressText.textContent = 'Rendering heatmap...';
      await new Promise(r => setTimeout(r, 50));

      const cesiumCanvas = viewer.canvas;
      const heatCanvas = document.createElement('canvas');
      heatCanvas.id = 'heatmapOverlay';
      heatCanvas.width = cesiumCanvas.width;
      heatCanvas.height = cesiumCanvas.height;
      heatCanvas.style.cssText =
        'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;';
      cesiumCanvas.parentElement.appendChild(heatCanvas);

      const ctx = heatCanvas.getContext('2d');
      // Radius large enough for neighboring blobs to overlap and blend
      const radius = Math.max(cesiumCanvas.width, cesiumCanvas.height) / (gridSize + 1) * 1.2;

      // Draw each sample as a radial gradient blob for smooth blending
      for (const point of points) {
        const ratio = point.totalSamples > 0 ? point.sunCount / point.totalSamples : 0;

        // Color: brown(shade) → orange → yellow(sun)
        let r, g, b;
        if (ratio <= 0.5) {
          const t = ratio / 0.5;
          r = Math.round(92 + (255 - 92) * t);
          g = Math.round(64 + (152 - 64) * t);
          b = Math.round(51 + (0 - 51) * t);
        } else {
          const t = (ratio - 0.5) / 0.5;
          r = 255;
          g = Math.round(152 + (235 - 152) * t);
          b = Math.round(0 + 59 * t);
        }

        const cx = point.screenPos.x;
        const cy = point.screenPos.y;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        grad.addColorStop(0, `rgba(${r},${g},${b},0.45)`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grad;
        ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
      }

      // Compute aggregate sun %
      let totalSun = 0;
      for (const p of points) {
        totalSun += p.totalSamples > 0 ? p.sunCount / p.totalSamples : 0;
      }
      const sunPct = Math.round((totalSun / points.length) * 100);

      document.getElementById('sunFill').style.width = sunPct + '%';
      document.getElementById('sunLabel').textContent =
        `${sunPct}% sun · ${points.length} points · ${startHour}:00–${endHour}:00`;

      analysisRunning = false;
      analyzeBtn.disabled = false;
      analysisProgress.style.display = 'none';
      analysisResult.style.display = 'block';
    }

    function clearAnalysis() {
      const overlay = document.getElementById('heatmapOverlay');
      if (overlay) overlay.remove();
      analysisResult.style.display = 'none';
      analysisProgress.style.display = 'none';
    }

    analyzeBtn.addEventListener('click', runAnalysis);
    document.getElementById('clearAnalysisBtn').addEventListener('click', clearAnalysis);

    // ==================== WEATHER DATA ====================

    /**
     * Weather data from 02ws (Jerusalem weather service, has CORS).
     * Stores current conditions, hourly forecasts, and daily forecasts.
     */
    let weatherData = {
      current: null,    // { cloudiness, uv, temp, humidity, rainChance }
      hourly: {},       // keyed by "YYYY-MM-DD HH" → { temp, uv, rain, sky, dust }
      daily: {},        // keyed by "YYYY-MM-DD" → { uvmax, desc, tempLow, tempHigh }
    };

    /**
     * Extract sky condition from 02ws icon filename.
     * Icons follow a pattern like "n4_rainmostlycloudy.svg" or "n4_sun.svg".
     */
    function skyFromIcon(icon) {
      if (!icon) return null;
      const name = icon.replace(/.*\//, '').replace('.svg', '').replace(/^n\d_/, '');
      if (/clear|sun(?!_rain)/.test(name) && !/cloud|rain/.test(name)) return { text: 'Clear', oktas: 1 };
      if (/partlycloudy|suncloud|sun_rain/.test(name)) return { text: 'Partly cloudy', oktas: 3 };
      if (/mostlycloudy/.test(name)) return { text: 'Mostly cloudy', oktas: 6 };
      if (/rain|thunder|storm/.test(name)) return { text: 'Rainy', oktas: 8 };
      if (/cloudy|overcast/.test(name)) return { text: 'Cloudy', oktas: 7 };
      if (/moon/.test(name) && !/cloud/.test(name)) return { text: 'Clear', oktas: 0 };
      if (/moonpc|mooncloud/.test(name)) return { text: 'Partly cloudy', oktas: 3 };
      return null;
    }

    /** Cloud oktas (0-8) to descriptive text */
    function cloudText(oktas) {
      if (oktas <= 1) return 'Clear';
      if (oktas <= 3) return 'Partly cloudy';
      if (oktas <= 5) return 'Mostly cloudy';
      if (oktas <= 7) return 'Cloudy';
      return 'Overcast';
    }

    /** Fetch weather data from 02ws (Jerusalem-specific, has CORS) */
    async function fetchWeather() {
      try {
        const res = await fetch('https://v2013.02ws.co.il/02wsjson.txt');
        const json = await res.json();
        const jws = json.jws;

        // Current conditions
        const c = jws.current;
        weatherData.current = {
          cloudiness: parseInt(c.cloudiness) || 0,
          uv: parseFloat(c.uv) || 0,
          temp: parseFloat(c.temp) || null,
          humidity: parseInt(c.hum) || null,
          rainChance: parseInt(c.rainchance) || 0,
        };

        // Hourly forecasts (next ~48h)
        if (jws.forecastHours) {
          for (const entry of Object.values(jws.forecastHours)) {
            const ts = parseInt(entry.currentDateTime) * 1000;
            const d = new Date(ts);
            const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}`;
            const sky = skyFromIcon(entry.icon);
            weatherData.hourly[key] = {
              temp: entry.temp,
              uv: entry.uv,
              rain: entry.rain,
              dust: entry.dust,
              sky: sky ? sky.text : null,
              oktas: sky ? sky.oktas : null,
            };
          }
        }

        // Daily forecasts (next 7 days)
        if (jws.forecastDays) {
          for (const entry of Object.values(jws.forecastDays)) {
            // Date format from 02ws: "DD/MM" → convert to "YYYY-MM-DD"
            const [dd, mm] = entry.date.split('/');
            const year = new Date().getFullYear();
            const dateKey = `${year}-${mm}-${dd}`;
            const sky = skyFromIcon(entry.icon);
            weatherData.daily[dateKey] = {
              uvmax: entry.uvmax,
              tempLow: entry.TempLow,
              tempHigh: entry.TempHigh,
              desc: entry.lang0 || '',
              sky: sky ? sky.text : null,
              oktas: sky ? sky.oktas : null,
            };
          }
        }
      } catch (err) {
        console.error('Failed to fetch weather data:', err);
      }
    }

    /** Returns UV index badge HTML */
    function uvBadge(uv) {
      const n = parseFloat(uv);
      if (isNaN(n)) return '<span class="uv-badge uv-low">—</span>';
      let cls, label;
      if (n <= 2) { cls = 'uv-low'; label = 'Low'; }
      else if (n <= 5) { cls = 'uv-moderate'; label = 'Moderate'; }
      else if (n <= 7) { cls = 'uv-high'; label = 'High'; }
      else if (n <= 10) { cls = 'uv-very-high'; label = 'Very High'; }
      else { cls = 'uv-extreme'; label = 'Extreme'; }
      return `<span class="uv-badge ${cls}">${n} ${label}</span>`;
    }

    /**
     * Update the weather panel to match the currently selected date/time.
     * Uses hourly data when available, falls back to daily or current.
     */
    function updateWeatherDisplay() {
      const weatherContent = document.getElementById('weatherContent');
      const weatherLoading = document.getElementById('weatherLoading');

      if (!Object.keys(weatherData.hourly).length && !weatherData.current) {
        weatherLoading.textContent = 'No weather data available';
        return;
      }

      weatherContent.style.display = 'block';
      weatherLoading.style.display = 'none';

      const minutes = parseInt(timeSlider.value);
      const hours = Math.floor(minutes / 60);
      const dateStr = dateInput.value;
      const hourKey = `${dateStr} ${String(hours).padStart(2, '0')}`;

      const hourly = weatherData.hourly[hourKey];
      const daily = weatherData.daily[dateStr];
      const cur = weatherData.current;

      // Sky / cloud conditions
      let skyText = '—', cloudOktas = null;
      if (hourly && hourly.sky) {
        skyText = hourly.sky;
        cloudOktas = hourly.oktas;
      } else if (daily && daily.sky) {
        skyText = daily.sky;
        cloudOktas = daily.oktas;
      } else if (cur) {
        cloudOktas = cur.cloudiness;
        skyText = cloudText(cloudOktas);
      }

      // UV index (hourly → current fallback)
      let uv = hourly ? hourly.uv : null;
      if ((uv === null || uv === undefined || uv === '') && cur) uv = cur.uv;

      // Temperature (hourly → current fallback)
      let temp = hourly ? hourly.temp : null;
      if (temp === null && cur) temp = cur.temp;

      // Rain chance (hourly → current fallback)
      let rain = hourly ? hourly.rain : null;
      if (rain === null && cur) rain = cur.rainChance;

      // Daily UV max
      const uvMax = daily ? daily.uvmax : null;

      document.getElementById('wxSky').textContent = skyText;
      document.getElementById('wxUV').innerHTML = uvBadge(uv);
      document.getElementById('wxTemp').textContent = temp !== null ? `${temp}°C` : '—';
      document.getElementById('wxRain').textContent = rain !== null ? `${rain}%` : '—';
      document.getElementById('wxCloud').textContent = cloudOktas !== null ? `${cloudOktas}/8` : '—';
      document.getElementById('wxUVMax').innerHTML = uvMax ? uvBadge(uvMax) : '—';

      // Daily description
      const wxDesc = document.getElementById('wxDesc');
      if (daily && daily.desc) {
        wxDesc.textContent = daily.desc.trim();
        wxDesc.style.display = 'block';
      } else {
        wxDesc.style.display = 'none';
      }
    }

    // Hook weather display into existing time change events
    dateInput.addEventListener('change', updateWeatherDisplay);
    timeSlider.addEventListener('input', updateWeatherDisplay);

    // Load weather data on startup
    fetchWeather().then(updateWeatherDisplay);

    // ==================== MOBILE PANEL TOGGLE ====================
    document.getElementById('panelToggle').addEventListener('click', () => {
      document.getElementById('controls').classList.toggle('collapsed');
    });
  </script>
</body>
