<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR</title>
  <meta name="description" content="Extract text from images and PDFs using PaddleOCR in the browser">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
</head>
<body>
  <main id="app">
    <h1>OCR</h1>
    <p class="subtitle">Extract text from images &amp; PDFs</p>

    <div id="drop-zone" class="drop-zone">
      <p>Drop image or PDF here, or tap to select</p>
      <input type="file" id="file-input" accept="image/*,.pdf" hidden>
    </div>

    <div id="status" class="status hidden"></div>

    <div id="results" class="results hidden">
      <div class="results-header">
        <h2>Extracted Text</h2>
        <button id="copy-btn" class="btn" title="Copy to clipboard">Copy</button>
      </div>
      <pre id="output"></pre>
    </div>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
