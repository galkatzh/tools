<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EPUB → XTC Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300..900&family=Heebo:wght@400;700&family=Alef:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- JSZip UMD — exposes global JSZip -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>EPUB → XTC</h1>
        <p>Convert EPUB books to XTC format for ESP32 e-paper displays.</p>
      </header>

      <section class="settings" aria-label="Conversion settings">
        <div class="setting-group">
          <label for="page-w">Page width (px)</label>
          <input id="page-w" type="number" value="480" min="100" max="2000" />
        </div>
        <div class="setting-group">
          <label for="page-h">Page height (px)</label>
          <input id="page-h" type="number" value="800" min="100" max="2000" />
        </div>
        <div class="setting-group">
          <label for="margin-x">Margin X (px)</label>
          <input id="margin-x" type="number" value="24" min="0" max="200" />
        </div>
        <div class="setting-group">
          <label for="margin-y">Margin Y (px)</label>
          <input id="margin-y" type="number" value="32" min="0" max="200" />
        </div>
        <div class="setting-group">
          <label for="font-size">Font size (px)</label>
          <input id="font-size" type="number" value="22" min="8" max="60" />
        </div>
        <div class="setting-group">
          <label for="line-spacing">Line spacing</label>
          <input id="line-spacing" type="number" value="1.5" min="1" max="3" step="0.1" />
        </div>
        <div class="setting-group">
          <label for="font-weight">Font weight</label>
          <select id="font-weight">
            <option value="300">300 — Light</option>
            <option value="400" selected>400 — Regular</option>
            <option value="500">500 — Medium</option>
            <option value="700">700 — Bold</option>
            <option value="900">900 — Black</option>
          </select>
        </div>
        <div class="setting-group">
          <label for="font-family">Font</label>
          <select id="font-family">
            <option value="Frank Ruhl Libre">Frank Ruhl Libre</option>
            <option value="Heebo">Heebo</option>
            <option value="Alef">Alef</option>
            <option value="serif">serif (system)</option>
          </select>
        </div>
        <div class="setting-group">
          <label for="dithering">Dithering</label>
          <select id="dithering">
            <option value="none">None</option>
            <option value="floyd-steinberg" selected>Floyd-Steinberg</option>
            <option value="atkinson">Atkinson</option>
          </select>
        </div>
        <div class="setting-group">
          <label for="dither-strength">Dither strength: <span id="dither-strength-val">100%</span></label>
          <input id="dither-strength" type="range" min="0" max="100" value="100" />
        </div>
        <div class="setting-group">
          <label for="read-dir">Reading direction</label>
          <select id="read-dir">
            <option value="1">Right → Left</option>
            <option value="0">Left → Right</option>
          </select>
        </div>
      </section>

      <section
        class="dropzone"
        id="dropzone"
        role="button"
        tabindex="0"
        aria-label="Drop EPUB file here or click to select"
      >
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 16V4m0 0-4 4m4-4 4 4M3 16v2a2 2 0 002 2h14a2 2 0 002-2v-2"/>
        </svg>
        <p>Drop <code>.epub</code> here or click to select</p>
        <input id="file-input" type="file" accept=".epub" />
      </section>

      <div class="progress-wrap" id="progress-wrap" hidden>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <p class="status" id="status" aria-live="polite"></p>
      </div>

      <button class="download-btn" id="download-btn" hidden>Download .xtc</button>

      <div class="preview" id="preview" hidden>
        <div class="preview-nav">
          <button id="prev-page" disabled>◀</button>
          <span id="page-label">Page 1 / 1</span>
          <button id="next-page" disabled>▶</button>
        </div>
        <div class="preview-main">
          <canvas id="preview-canvas"></canvas>
        </div>
        <div class="preview-strip" id="preview-strip"></div>
      </div>
    </main>

    <script type="module">
import { prepareWithSegments, layoutWithLines, setLocale, clearCache } from
  'https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.4/dist/layout.min.js';

// ─── UI helpers ──────────────────────────────────────────────────────────────

const $ = id => document.getElementById(id);

function setStatus(msg) { $('status').textContent = msg; }
function setProgress(pct) { $('progress-fill').style.width = pct + '%'; }
function showProgress() { $('progress-wrap').hidden = false; }

function getSettings() {
  return {
    pageW:       +$('page-w').value,
    pageH:       +$('page-h').value,
    marginX:     +$('margin-x').value,
    marginY:     +$('margin-y').value,
    fontSize:    +$('font-size').value,
    lineSpacing: +$('line-spacing').value,
    fontWeight:  $('font-weight').value,
    fontFamily:  $('font-family').value,
    dithering:        $('dithering').value,
    ditherStrength:   +$('dither-strength').value / 100,
    readDir:     +$('read-dir').value,
  };
}

// ─── EPUB parsing ────────────────────────────────────────────────────────────

/**
 * Unzip and parse an EPUB file.
 * Returns { meta: {title, author, language}, paragraphs: string[] }.
 */
async function parseEpub(file) {
  const zip = await JSZip.loadAsync(file);

  // Locate OPF from META-INF/container.xml
  const containerXml = await zip.file('META-INF/container.xml').async('string');
  const containerDoc = new DOMParser().parseFromString(containerXml, 'text/xml');
  const opfPath = containerDoc.querySelector('rootfile').getAttribute('full-path');
  const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/') + 1) : '';

  const opfXml = await zip.file(opfPath).async('string');
  const opf = new DOMParser().parseFromString(opfXml, 'text/xml');

  // Dublin Core metadata
  const dc = 'http://purl.org/dc/elements/1.1/';
  const meta = {
    title:    opf.getElementsByTagNameNS(dc, 'title')[0]?.textContent?.trim() ?? '',
    author:   opf.getElementsByTagNameNS(dc, 'creator')[0]?.textContent?.trim() ?? '',
    language: opf.getElementsByTagNameNS(dc, 'language')[0]?.textContent?.trim() ?? '',
  };

  // Manifest: idref → resolved file path (HTML/XHTML items only)
  const manifest = {};
  opf.querySelectorAll('manifest item').forEach(item => {
    const type = item.getAttribute('media-type') ?? '';
    if (!type.includes('html') && !type.includes('xml')) return;
    const href = decodeURIComponent(item.getAttribute('href'));
    manifest[item.getAttribute('id')] = opfDir + href;
  });

  // Spine order
  const spineRefs = [...opf.querySelectorAll('spine itemref')]
    .map(ref => manifest[ref.getAttribute('idref')])
    .filter(Boolean);

  // Extract text paragraphs from each spine document
  const paragraphs = [];
  for (const href of spineRefs) {
    // JSZip lookup is case-sensitive; try both with and without leading slash
    const zipFile = zip.file(href) ?? zip.file(href.replace(/^\//, ''));
    if (!zipFile) continue;

    const html = await zipFile.async('string');
    // EPUB spine items are often XHTML; parse as such and fall back to HTML
    let doc = new DOMParser().parseFromString(html, 'application/xhtml+xml');
    if (doc.querySelector('parsererror')) {
      doc = new DOMParser().parseFromString(html, 'text/html');
    }

    // Strip navigation and non-content elements
    doc.querySelectorAll('nav, script, style').forEach(el => el.remove());

    doc.querySelectorAll('p, h1, h2, h3, h4, h5, h6, li, blockquote, dd, dt').forEach(el => {
      const text = el.textContent.replace(/\s+/g, ' ').trim();
      if (text) paragraphs.push(text);
    });
  }

  return { meta, paragraphs };
}

// ─── Text layout ─────────────────────────────────────────────────────────────

/**
 * Flow paragraphs into pages using pretext for accurate line-breaking.
 * Returns an array of pages; each page is an array of { text, y } lines.
 * onProgress(0–50) is called as lines are computed.
 */
async function paginateText(paragraphs, settings, onProgress) {
  const { pageW, pageH, marginX, marginY, fontSize, lineSpacing, fontWeight, fontFamily } = settings;
  const lineHeight = Math.round(fontSize * lineSpacing);
  const textW     = pageW - marginX * 2;
  const bottomEdge = pageH - marginY;
  const font      = `${fontWeight} ${fontSize}px "${fontFamily}", serif`;
  const paraGap   = Math.round(lineHeight * 0.5);

  // Ensure the font is loaded before pretext measures with it
  await document.fonts.load(font);
  setLocale('he');

  const pages = [];
  let currentPage = [];
  let y = marginY;

  function newPage() {
    pages.push(currentPage);
    currentPage = [];
    y = marginY;
  }

  function addLine(text) {
    if (y + lineHeight > bottomEdge) newPage();
    currentPage.push({ text, y });
    y += lineHeight;
  }

  for (let i = 0; i < paragraphs.length; i++) {
    const prepared = prepareWithSegments(paragraphs[i], font);
    const { lines } = layoutWithLines(prepared, textW, lineHeight);
    for (const line of lines) addLine(line.text);
    y += paraGap;
    if (i % 10 === 0) onProgress((i / paragraphs.length) * 50);
  }

  if (currentPage.length > 0) pages.push(currentPage);
  clearCache();
  return pages;
}

// ─── Canvas rendering ────────────────────────────────────────────────────────

/**
 * Render one page (array of {text, y}) to an OffscreenCanvas.
 * Text is drawn RTL when readDir === 1.
 */
function renderPage(lines, settings) {
  const { pageW, pageH, marginX, fontSize, lineSpacing, fontWeight, fontFamily, readDir } = settings;
  const isRTL = readDir === 1;
  const font  = `${fontWeight} ${fontSize}px "${fontFamily}", serif`;

  const canvas = new OffscreenCanvas(pageW, pageH);
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, pageW, pageH);

  ctx.font = font;
  ctx.fillStyle = '#000';
  ctx.direction   = isRTL ? 'rtl' : 'ltr';
  ctx.textAlign   = isRTL ? 'right' : 'left';
  ctx.textBaseline = 'top';

  const textX = isRTL ? pageW - marginX : marginX;
  for (const line of lines) ctx.fillText(line.text, textX, line.y);

  return canvas;
}

// ─── XTG encoding ────────────────────────────────────────────────────────────

/**
 * Convert an OffscreenCanvas to a 1-bit monochrome XTG image.
 * Returns a Uint8Array containing the 22-byte header + bitmap data.
 *
 * Pixel layout: rows top→bottom, left→right, 8px/byte, MSB = leftmost pixel.
 * Bit value: 0 = black, 1 = white.
 *
 * dithering: 'none' | 'floyd-steinberg' | 'atkinson'
 */
function encodeXTG(canvas, dithering = 'none', ditherStrength = 1) {
  const w = canvas.width, h = canvas.height;
  const { data } = canvas.getContext('2d').getImageData(0, 0, w, h); // RGBA

  // Build a mutable Float32Array of grayscale values [0–255]
  const gray = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    gray[i] = 0.299 * data[i * 4] + 0.587 * data[i * 4 + 1] + 0.114 * data[i * 4 + 2];
  }

  // Error-diffusion helpers
  const addErr = (x, y, e) => {
    if (x >= 0 && x < w && y >= 0 && y < h) gray[y * w + x] += e;
  };

  // Quantise to 1-bit, optionally diffusing error to neighbours
  const bits = new Uint8Array(w * h); // 1 = white, 0 = black
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = y * w + x;
      const old = gray[idx];
      const q   = old >= 128 ? 255 : 0;
      bits[idx] = q === 255 ? 1 : 0;
      if (dithering === 'none') continue;

      const err = (old - q) * ditherStrength;
      if (dithering === 'floyd-steinberg') {
        // Distributes full error to 4 neighbours
        addErr(x + 1, y,     err * 7 / 16);
        addErr(x - 1, y + 1, err * 3 / 16);
        addErr(x,     y + 1, err * 5 / 16);
        addErr(x + 1, y + 1, err * 1 / 16);
      } else if (dithering === 'atkinson') {
        // Distributes 6/8 of error — lighter, crisper look preferred on e-paper
        const e = err / 8;
        addErr(x + 1, y,     e);
        addErr(x + 2, y,     e);
        addErr(x - 1, y + 1, e);
        addErr(x,     y + 1, e);
        addErr(x + 1, y + 1, e);
        addErr(x,     y + 2, e);
      }
    }
  }

  // Pack bits into XTG binary
  const rowBytes = Math.ceil(w / 8);
  const dataSize = rowBytes * h;
  const buf  = new ArrayBuffer(22 + dataSize);
  const view = new DataView(buf);

  view.setUint32(0x00, 0x00475458, true); // "XTG\0"
  view.setUint16(0x04, w, true);
  view.setUint16(0x06, h, true);
  view.setUint8 (0x08, 0);               // colorMode = monochrome
  view.setUint8 (0x09, 0);               // compression = none
  view.setUint32(0x0A, dataSize, true);
  // Bytes 0x0E–0x15: optional MD5; leave as zero

  const bmp = new Uint8Array(buf, 22);
  for (let row = 0; row < h; row++) {
    for (let col = 0; col < rowBytes; col++) {
      let byte = 0;
      for (let bit = 0; bit < 8; bit++) {
        const x = col * 8 + bit;
        if (x < w && bits[row * w + x]) byte |= 1 << (7 - bit);
      }
      bmp[row * rowBytes + col] = byte;
    }
  }
  return new Uint8Array(buf);
}

// ─── XTC container assembly ──────────────────────────────────────────────────

/**
 * Pack an array of XTG Uint8Arrays into an XTC container binary.
 * File layout:
 *   [0]   56-byte header
 *   [56]  256-byte metadata
 *   [312] pageCount × 16-byte index table
 *   [312 + pageCount*16] concatenated XTG page data
 */
function assembleXTC(xtgPages, meta, readDir) {
  const pageCount  = xtgPages.length;
  const metaOff    = 56;
  const indexOff   = metaOff + 256;
  const dataOff    = indexOff + pageCount * 16;

  // Compute absolute file offset for each page
  const pageOffsets = [];
  let cursor = dataOff;
  for (const page of xtgPages) { pageOffsets.push(cursor); cursor += page.length; }

  const buf  = new ArrayBuffer(cursor);
  const view = new DataView(buf);
  const bytes = new Uint8Array(buf);
  const enc  = new TextEncoder();

  /** Write little-endian uint64 as two uint32s (values stay within 32-bit for typical files). */
  function u64(offset, value) {
    view.setUint32(offset,     value >>> 0, true);
    view.setUint32(offset + 4, Math.floor(value / 0x100000000) >>> 0, true);
  }

  // ── Header (56 bytes) ──
  view.setUint32(0x00, 0x00435458, true); // "XTC\0"
  view.setUint16(0x04, 0x0100, true);     // version 1.0
  view.setUint16(0x06, pageCount, true);
  view.setUint8 (0x08, readDir);          // reading direction
  view.setUint8 (0x09, 1);               // hasMetadata = true
  view.setUint8 (0x0A, 0);               // hasThumbnails = false
  view.setUint8 (0x0B, 0);               // hasChapters = false
  view.setUint32(0x0C, 1, true);          // currentPage = 1 (1-based)
  u64(0x10, metaOff);
  u64(0x18, indexOff);
  u64(0x20, dataOff);
  u64(0x28, 0); // thumbOffset — none
  u64(0x30, 0); // chapterOffset — none

  // ── Metadata (256 bytes) ──
  function writeStr(str, offset, maxLen) {
    bytes.set(enc.encode(str).slice(0, maxLen - 1), offset);
  }
  writeStr(meta.title,    metaOff + 0x00, 128);
  writeStr(meta.author,   metaOff + 0x80, 64);
  writeStr(meta.language || 'he', metaOff + 0xE0, 16);
  view.setUint32(metaOff + 0xF0, (Date.now() / 1000) | 0, true); // Unix timestamp
  view.setUint16(metaOff + 0xF4, 0xFFFF, true); // coverPage = none
  view.setUint16(metaOff + 0xF6, 0, true);       // chapterCount = 0

  // ── Page index table (16 bytes per page) ──
  for (let i = 0; i < pageCount; i++) {
    const base = indexOff + i * 16;
    const pv   = new DataView(xtgPages[i].buffer, xtgPages[i].byteOffset);
    u64(base + 0x00, pageOffsets[i]);
    view.setUint32(base + 0x08, xtgPages[i].length, true);
    view.setUint16(base + 0x0C, pv.getUint16(0x04, true), true); // width from XTG header
    view.setUint16(base + 0x0E, pv.getUint16(0x06, true), true); // height from XTG header
  }

  // ── Page data ──
  let off = dataOff;
  for (const page of xtgPages) { bytes.set(page, off); off += page.length; }

  return new Uint8Array(buf);
}

// ─── Preview ─────────────────────────────────────────────────────────────────

/**
 * Decode a XTG Uint8Array back to a <canvas> element.
 * This shows exactly what the e-paper device will render (1-bit monochrome).
 */
function xtgToCanvas(xtg) {
  const view = new DataView(xtg.buffer, xtg.byteOffset);
  const w = view.getUint16(0x04, true);
  const h = view.getUint16(0x06, true);

  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(w, h);
  const px  = img.data;

  const rowBytes = Math.ceil(w / 8);
  const bmp = xtg.subarray(22); // skip 22-byte header

  for (let row = 0; row < h; row++) {
    for (let col = 0; col < rowBytes; col++) {
      const byte = bmp[row * rowBytes + col];
      for (let bit = 0; bit < 8; bit++) {
        const x = col * 8 + bit;
        if (x >= w) continue;
        const v = (byte >> (7 - bit)) & 1 ? 255 : 0; // 1=white, 0=black
        const i = (row * w + x) * 4;
        px[i] = px[i + 1] = px[i + 2] = v;
        px[i + 3] = 255;
      }
    }
  }

  ctx.putImageData(img, 0, 0);
  return canvas;
}

/** Render the preview viewer from an array of XTG pages. */
function showPreview(xtgPages) {
  const section   = $('preview');
  const mainCanvas = $('preview-canvas');
  const strip     = $('preview-strip');
  const label     = $('page-label');
  const prevBtn   = $('prev-page');
  const nextBtn   = $('next-page');

  const canvases = xtgPages.map(xtgToCanvas);
  let current = 0;

  // Build thumbnail strip
  strip.innerHTML = '';
  canvases.forEach((c, i) => {
    const thumbW = 80;
    const thumbH = Math.round(c.height * (thumbW / c.width));

    const wrapper = document.createElement('div');
    wrapper.className = 'thumb' + (i === 0 ? ' active' : '');

    const tc = document.createElement('canvas');
    tc.width = thumbW;
    tc.height = thumbH;
    tc.getContext('2d').drawImage(c, 0, 0, thumbW, thumbH);

    wrapper.appendChild(tc);
    wrapper.addEventListener('click', () => goTo(i));
    strip.appendChild(wrapper);
  });

  function goTo(i) {
    current = i;
    const c = canvases[i];
    mainCanvas.width  = c.width;
    mainCanvas.height = c.height;
    mainCanvas.getContext('2d').drawImage(c, 0, 0);

    label.textContent = `Page ${i + 1} / ${canvases.length}`;
    prevBtn.disabled  = i === 0;
    nextBtn.disabled  = i === canvases.length - 1;

    strip.querySelectorAll('.thumb').forEach((el, j) => el.classList.toggle('active', j === i));
    strip.children[i]?.scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
  }

  prevBtn.onclick = () => goTo(current - 1);
  nextBtn.onclick = () => goTo(current + 1);

  goTo(0);
  section.hidden = false;
}

// ─── Conversion orchestrator ─────────────────────────────────────────────────

async function convert(file) {
  const settings = getSettings();
  $('download-btn').hidden = true;
  showProgress();
  setProgress(0);

  try {
    setStatus('Parsing EPUB…');
    const { meta, paragraphs } = await parseEpub(file);
    if (paragraphs.length === 0) throw new Error('No text content found in EPUB.');
    setProgress(5);
    setStatus(`${paragraphs.length} paragraphs extracted. Computing layout…`);

    // Auto-detect RTL from declared language unless user changed it
    if (meta.language && !$('read-dir').dataset.userSet) {
      const isRTL = /^(he|ar|fa|ur)/i.test(meta.language);
      settings.readDir = isRTL ? 1 : 0;
      $('read-dir').value = String(settings.readDir);
    }

    const pages = await paginateText(paragraphs, settings, pct => setProgress(5 + pct));
    setProgress(55);
    setStatus(`Rendering ${pages.length} pages…`);

    const xtgPages = [];
    for (let i = 0; i < pages.length; i++) {
      xtgPages.push(encodeXTG(renderPage(pages[i], settings), settings.dithering, settings.ditherStrength));
      if (i % 5 === 0) setProgress(55 + (i / pages.length) * 38);
    }

    setProgress(93);
    setStatus('Assembling XTC container…');
    const xtc = assembleXTC(xtgPages, meta, settings.readDir);

    setProgress(100);
    setStatus(`Done — ${pages.length} pages · ${(xtc.length / 1024).toFixed(0)} KB`);

    showPreview(xtgPages);

    const url  = URL.createObjectURL(new Blob([xtc], { type: 'application/octet-stream' }));
    const base = file.name.replace(/\.epub$/i, '');
    const btn  = $('download-btn');
    btn.textContent = `Download ${base}.xtc`;
    btn.hidden = false;
    btn.onclick = () => Object.assign(document.createElement('a'), { href: url, download: base + '.xtc' }).click();
  } catch (err) {
    console.error('Conversion failed:', err);
    setStatus(`Error: ${err.message}`);
  }
}

// ─── UI wiring ───────────────────────────────────────────────────────────────

const dropzone  = $('dropzone');
const fileInput = $('file-input');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('hover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('hover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('hover');
  const f = e.dataTransfer.files[0];
  if (f?.name.toLowerCase().endsWith('.epub')) convert(f);
  else setStatus('Please drop an .epub file.');
});
fileInput.addEventListener('change', () => {
  if (!fileInput.files[0]) return;
  const file = fileInput.files[0];
  fileInput.value = ''; // reset so the same file can be re-selected
  convert(file);
});

// Flag manual direction changes so auto-detect doesn't override them
$('read-dir').addEventListener('change', () => { $('read-dir').dataset.userSet = '1'; });

// Dither strength label + hide when dithering is off
const ditherStrengthGroup = $('dither-strength').closest('.setting-group');
function updateDitherUI() {
  const off = $('dithering').value === 'none';
  ditherStrengthGroup.style.opacity = off ? '0.3' : '1';
  ditherStrengthGroup.style.pointerEvents = off ? 'none' : '';
  $('dither-strength-val').textContent = $('dither-strength').value + '%';
}
$('dithering').addEventListener('change', updateDitherUI);
$('dither-strength').addEventListener('input', updateDitherUI);
updateDitherUI();
    </script>
  </body>
</html>
